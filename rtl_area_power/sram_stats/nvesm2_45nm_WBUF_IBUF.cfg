# NVESM2 operand buffer SRAM for CACTI 7.0.
#
# Technology:
#   Use CACTI's 45 nm technology point to match the FreePDK45/Nangate
#   45 nm synthesis reports used for the NVESM2 PE tile and quant engine.
#
# Capacity derivation:
#   The existing MXFP WBUF/IBUF model uses 128 KiB data + 16 KiB metadata
#   per operand buffer: 64 B data line + 8 B metadata = 72 B line.
#   NVESM2 stores, per 32 FP4 values:
#     fp4_bus         = 32 * 4 b = 128 b
#     group_scale_bus = 2 * 8 b  =  16 b
#     es_idx_bus      = 4 * 2 b  =   8 b
#   Scaling to a 128-value, 64 B data line gives:
#     data = 512 b, metadata = 4 * (16 b + 8 b) = 96 b
#     total line = 608 b = 76 B
#   One operand buffer is 128 KiB data * 76/64 = 152 KiB.
#   This cfg models one operand buffer. Use it for either WBUF or IBUF;
#   multiply the CACTI result by 2 when accounting for both.

# Cache size
-size (bytes) 155648

# power gating
-Array Power Gating - "false"
-WL Power Gating - "false"
-CL Power Gating - "false"
-Bitline floating - "false"
-Interconnect Power Gating - "false"
-Power Gating Performance Loss 0.01

# Line size: 64 B FP4 data + 12 B NVESM2 metadata.
-block size (bytes) 76

# Direct-mapped RAM, matching the active 28 nm WBUF/IBUF cfg.
-associativity 1

# Support read and write in the same cycle.
-read-write port 0
-exclusive read port 1
-exclusive write port 1
-single ended read ports 0

# Multiple banks connected using a bus
-UCA bank count 1
-technology (u) 0.045

# following three parameters are meaningful only for main memories
-page size (bits) 8192
-burst length 8
-internal prefetch width 8

# following parameter can have one of five values -- (itrs-hp, itrs-lstp, itrs-lop, lp-dram, comm-dram)
-Data array cell type - "itrs-hp"
-Data array peripheral type - "itrs-hp"
-Tag array cell type - "itrs-hp"
-Tag array peripheral type - "itrs-hp"

# Bus width includes data bits and metadata bits.
-output/input bus width 608

-operating temperature (K) 360

# Type of memory
-cache type "ram"

# to model special structure like branch target buffers...
-tag size (b) "default"

# access mode
-access mode (normal, sequential, fast) - "normal"

# DESIGN OBJECTIVE for UCA (or banks in NUCA)
-design objective (weight delay, dynamic power, leakage power, cycle time, area) 0:0:0:100:0
-deviate (delay, dynamic power, leakage power, cycle time, area) 20:100000:100000:100000:100000

-NUCAdesign objective (weight delay, dynamic power, leakage power, cycle time, area) 100:100:0:0:100
-NUCAdeviate (delay, dynamic power, leakage power, cycle time, area) 10:10000:10000:10000:10000

-Optimize ED or ED^2 (ED, ED^2, NONE): "ED^2"
-Cache model (NUCA, UCA)  - "UCA"
-NUCA bank count 0

-Wire signaling (fullswing, lowswing, default) - "Global_30"
-Wire inside mat - "semi-global"
-Wire outside mat - "semi-global"
-Interconnect projection - "conservative"

-Core count 8
-Cache level (L2/L3) - "L3"
-Add ECC - "false"

-Print level (DETAILED, CONCISE) - "DETAILED"
-Print input parameters - "false"
-Force cache config - "false"
-Ndwl 1
-Ndbl 1
-Nspd 0
-Ndcm 1
-Ndsam1 0
-Ndsam2 0

#### Default CONFIGURATION values for baseline external IO parameters to DRAM.
-dram_type "W"
-iostate "W"
-dram_ecc "N"
-addr_timing 1.0
-bus_bw  12.8 GBps
-mem_density 4 Gb
-bus_freq 400 MHz
-duty_cycle 1.0
-activity_dq 1.0
-activity_ca 0.5
-num_dq 128
-num_dqs 16
-num_ca 30
-num_clk  2
-num_mem_dq 2
-mem_data_width 128
